<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>فروشگاه سه بعدی | موبایل پسند</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Vazir', 'Tahoma', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 12px;
            perspective: 1200px;
        }

        /* ذرات پس زمینه */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(102,126,234,0.3), transparent);
            border-radius: 50%;
            animation: floatParticle 12s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.2; }
            25% { transform: translateY(-30px) translateX(15px) scale(1.1); opacity: 0.4; }
            50% { transform: translateY(0) translateX(-20px) scale(0.9); opacity: 0.3; }
            75% { transform: translateY(30px) translateX(10px) scale(1.05); opacity: 0.35; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* انیمیشن ورود سه بعدی */
        @keyframes fadeIn3D {
            from { opacity: 0; transform: translateY(30px) rotateX(-10deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        /* فرم‌های سه بعدی - موبایل پسند */
        .form-box {
            max-width: 500px;
            width: 95%;
            margin: 40px auto;
            background: rgba(20, 20, 40, 0.92);
            backdrop-filter: blur(15px);
            padding: 30px 25px;
            border-radius: 35px;
            animation: fadeIn3D 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(102,126,234,0.4);
            transform-style: preserve-3d;
            transition: all 0.3s;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .form-box:hover {
            transform: translateY(-5px);
            border-color: rgba(102,126,234,0.7);
        }

        .form-box h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 28px;
            background: linear-gradient(135deg, #fff, #a8c0ff, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .form-box input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border: 2px solid rgba(102,126,234,0.3);
            border-radius: 50px;
            font-size: 15px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            transition: all 0.3s;
        }

        .form-box input:focus {
            outline: none;
            border-color: #667eea;
            transform: scale(1.01);
        }

        .form-box button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .form-box button:active {
            transform: scale(0.98);
        }

        .link-btn {
            text-align: center;
            margin-top: 20px;
        }

        .link-btn a {
            color: #a8c0ff;
            text-decoration: none;
            font-size: 14px;
        }

        /* هدر موبایل پسند با منوی همبرگری */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 25, 0.85);
            backdrop-filter: blur(15px);
            padding: 12px 20px;
            border-radius: 60px;
            margin: 10px;
            border: 1px solid rgba(102,126,234,0.3);
            position: relative;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a8c0ff, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* دکمه همبرگری */
        .menu-toggle {
            display: none;
            background: rgba(102,126,234,0.3);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            color: white;
            align-items: center;
            justify-content: center;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-links button {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(102,126,234,0.3);
            color: #e0e0e0;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .nav-links button:active {
            transform: scale(0.96);
        }

        /* محصولات - گرید واکنش‌گرا */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product-card {
            border-radius: 28px;
            padding: 18px;
            text-align: center;
            background: rgba(25, 25, 45, 0.92);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            border: 1px solid rgba(102,126,234,0.2);
            animation: fadeIn3D 0.4s ease-out backwards;
            cursor: pointer;
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 22px;
        }

        .product-card h3 {
            margin: 12px 0 6px;
            color: #fff;
            font-size: 17px;
        }

        .product-card .price {
            color: #a8c0ff;
            font-size: 22px;
            font-weight: bold;
        }

        .product-card .old-price {
            color: #888;
            font-size: 12px;
            text-decoration: line-through;
        }

        .discount-badge {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 10px;
            display: inline-block;
            margin-bottom: 8px;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 9px 20px;
            border-radius: 50px;
            cursor: pointer;
            margin: 5px;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }

        button:active {
            transform: scale(0.96);
        }

        button.danger { background: linear-gradient(135deg, #f093fb, #f5576c); }
        button.success { background: linear-gradient(135deg, #11998e, #38ef7d); }

        .credit-box {
            background: linear-gradient(135deg, rgba(255,193,7,0.15), rgba(255,152,0,0.08));
            backdrop-filter: blur(10px);
            padding: 12px 18px;
            border-radius: 60px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 16px;
            border: 1px solid rgba(255,193,7,0.3);
            color: #ffd966;
            text-align: center;
        }

        .section-title {
            font-size: 24px;
            color: #fff;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 3px solid #667eea;
            display: inline-block;
        }

        .hidden { display: none; }

        .content-padding {
            padding: 15px;
        }

        input, select, textarea {
            border: 2px solid rgba(102,126,234,0.3);
            border-radius: 50px;
            padding: 12px 16px;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            width: 100%;
        }

        .message-box {
            background: rgba(30,30,55,0.9);
            backdrop-filter: blur(10px);
            padding: 14px;
            border-radius: 22px;
            margin-bottom: 12px;
            border-right: 4px solid #667eea;
            color: #e0e0e0;
            font-size: 14px;
        }

        .ticket-card {
            background: rgba(30,30,55,0.92);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid rgba(102,126,234,0.3);
        }

        .ticket-status-pending { color: #ff9800; font-weight: bold; font-size: 13px; }
        .ticket-status-answered { color: #4caf50; font-weight: bold; font-size: 13px; }
        .answer-box {
            background: rgba(0,0,0,0.3);
            border-radius: 18px;
            padding: 12px;
            margin-top: 12px;
        }

        /* جدول واکنش‌گرا - برای موبایل اسکرول افقی */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
        }
        table {
            width: 100%;
            min-width: 550px;
            border-collapse: collapse;
            background: rgba(20,20,40,0.9);
            border-radius: 20px;
        }
        th, td {
            border: 1px solid rgba(102,126,234,0.2);
            padding: 10px 8px;
            text-align: center;
            color: #e0e0e0;
            font-size: 13px;
        }
        th {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        /* ==== استایل موبایل ==== */
        @media (max-width: 768px) {
            body {
                padding: 8px;
            }
            
            .menu-toggle {
                display: flex;
            }
            
            .nav-links {
                display: none;
                position: absolute;
                top: 70px;
                right: 10px;
                left: 10px;
                background: rgba(10, 10, 25, 0.95);
                backdrop-filter: blur(20px);
                flex-direction: column;
                border-radius: 28px;
                padding: 15px;
                gap: 10px;
                border: 1px solid rgba(102,126,234,0.4);
                z-index: 100;
            }
            
            .nav-links.show {
                display: flex;
            }
            
            .nav-links button {
                width: 100%;
                text-align: center;
                padding: 12px;
                font-size: 14px;
                white-space: normal;
            }
            
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
            }
            
            .product-card {
                padding: 14px;
            }
            
            .product-card img {
                height: 170px;
            }
            
            .form-box {
                padding: 25px 20px;
                margin: 30px auto;
            }
            
            .form-box h2 {
                font-size: 24px;
            }
            
            .content-padding {
                padding: 12px;
            }
            
            .credit-box {
                font-size: 14px;
                padding: 10px 15px;
            }
            
            .section-title {
                font-size: 20px;
            }
            
            button {
                padding: 8px 16px;
                font-size: 12px;
            }
            
            .logo {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .product-card img {
                height: 200px;
            }
            
            .form-box {
                width: 100%;
                margin: 20px 0;
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a1a;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container" id="app">
    <!-- صفحه ورود -->
    <div id="loginPage" class="form-box">
        <h2>✨ فروشگاه سه بعدی</h2>
        <input type="text" id="loginEmail" placeholder="ایمیل">
        <input type="password" id="loginPassword" placeholder="رمز عبور">
        <button onclick="handleLogin()">🚀 ورود به حساب</button>
        <div class="link-btn">
            <a href="#" onclick="showRegister()">➡️ ثبت نام سه بعدی</a><br>
            <a href="#" onclick="showForgot()">❓ فراموشی رمز سه بعدی</a>
        </div>
    </div>

    <!-- صفحه ثبت نام -->
    <div id="registerPage" class="form-box hidden">
        <h2>📝 ثبت نام سه بعدی</h2>
        <input type="text" id="regName" placeholder="نام و نام خانوادگی">
        <input type="text" id="regPhone" placeholder="شماره تلفن">
        <input type="email" id="regEmail" placeholder="ایمیل">
        <input type="password" id="regPassword" placeholder="رمز عبور">
        <button onclick="handleRegister()">ثبت نام سه بعدی</button>
        <div class="link-btn"><a href="#" onclick="showLogin()">↩️ بازگشت به ورود</a></div>
    </div>

    <!-- صفحه فراموشی رمز -->
    <div id="forgotPage" class="form-box hidden">
        <h2>🔐 فراموشی رمز عبور</h2>
        <input type="text" id="forgotPhone" placeholder="شماره تلفن">
        <input type="email" id="forgotEmail" placeholder="ایمیل">
        <button onclick="handleForgot()">دریافت رمز سه بعدی</button>
        <div class="link-btn"><a href="#" onclick="showLogin()">↩️ بازگشت به ورود</a></div>
    </div>

    <!-- پنل مشتری با منوی همبرگری -->
    <div id="customerPanel" class="hidden">
        <div class="header">
            <div class="logo">👑 فروشگاه سه بعدی</div>
            <button class="menu-toggle" onclick="toggleMenu()">☰</button>
            <div class="nav-links" id="customerMenu">
                <button onclick="showCustomerSection('products'); toggleMenu()">🛍️ کالاها</button>
                <button onclick="showCustomerSection('specials'); toggleMenu()">✨ ویژه‌ها</button>
                <button onclick="showCustomerSection('discounts'); toggleMenu()">🎁 تخفیف‌ها</button>
                <button onclick="showCustomerSection('cart'); toggleMenu()">🛒 سبد خرید</button>
                <button onclick="showCustomerSection('tickets'); toggleMenu()">🎫 تیکت‌ها</button>
                <button onclick="showCustomerSection('messages'); toggleMenu()">📬 پیام‌ها</button>
                <button onclick="showCustomerSection('creditRequest'); toggleMenu()">💰 درخواست اعتبار</button>
                <button onclick="logout(); toggleMenu()">🚪 خروج</button>
            </div>
        </div>
        <div class="content-padding">
            <div class="credit-box" id="creditDisplay">💰 اعتبار شما: 0 تومان</div>
            <div id="customerProducts"></div>
            <div id="customerSpecials" class="hidden"></div>
            <div id="customerDiscounts" class="hidden"></div>
            <div id="customerCart" class="hidden"></div>
            <div id="customerTickets" class="hidden"></div>
            <div id="customerMessages" class="hidden"></div>
            <div id="customerCreditRequest" class="hidden"></div>
        </div>
    </div>

    <!-- پنل ادمین با منوی همبرگری -->
    <div id="adminPanel" class="hidden">
        <div class="header">
            <div class="logo">👑 پنل مدیریت سه بعدی</div>
            <button class="menu-toggle" onclick="toggleAdminMenu()">☰</button>
            <div class="nav-links" id="adminMenu">
                <button onclick="showAdminSection('dashboard'); toggleAdminMenu()">📊 داشبورد</button>
                <button onclick="showAdminSection('products'); toggleAdminMenu()">👕 مدیریت کالا</button>
                <button onclick="showAdminSection('orders'); toggleAdminMenu()">📦 سفارشات</button>
                <button onclick="showAdminSection('users'); toggleAdminMenu()">👥 مدیریت اعضا</button>
                <button onclick="showAdminSection('credit'); toggleAdminMenu()">💰 تعیین اعتبار</button>
                <button onclick="showAdminSection('creditRequests'); toggleAdminMenu()">📝 درخواست اعتبار</button>
                <button onclick="showAdminSection('tickets'); toggleAdminMenu()">🎫 تیکت‌ها</button>
                <button onclick="showAdminSection('messages'); toggleAdminMenu()">📨 پیام‌ها</button>
                <button onclick="logout(); toggleAdminMenu()">🚪 خروج</button>
            </div>
        </div>
        <div class="content-padding">
            <div id="adminDashboard" class="hidden"></div>
            <div id="adminProducts" class="hidden"></div>
            <div id="adminOrders" class="hidden"></div>
            <div id="adminUsers" class="hidden"></div>
            <div id="adminCredit" class="hidden"></div>
            <div id="adminCreditRequests" class="hidden"></div>
            <div id="adminTickets" class="hidden"></div>
            <div id="adminMessages" class="hidden"></div>
        </div>
    </div>
</div>

<script>
    // توابع منوی همبرگری
    function toggleMenu() {
        const menu = document.getElementById('customerMenu');
        if (menu) menu.classList.toggle('show');
    }
    function toggleAdminMenu() {
        const menu = document.getElementById('adminMenu');
        if (menu) menu.classList.toggle('show');
    }
    // بستن منو با کلیک خارج
    document.addEventListener('click', function(event) {
        const customerMenu = document.getElementById('customerMenu');
        const adminMenu = document.getElementById('adminMenu');
        const toggleBtn = document.querySelector('.menu-toggle');
        if (toggleBtn && !toggleBtn.contains(event.target)) {
            if (customerMenu) customerMenu.classList.remove('show');
            if (adminMenu) adminMenu.classList.remove('show');
        }
    });

    // ذرات پس زمینه
    function createParticles() {
        const particlesDiv = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 40 + 15;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.animationDuration = (Math.random() * 12 + 6) + 's';
            particlesDiv.appendChild(particle);
        }
    }
    createParticles();

    // دیتابیس
    if (!localStorage.getItem('initialized')) {
        localStorage.clear();
        localStorage.setItem('initialized', 'true');
    }
    
    let users = JSON.parse(localStorage.getItem('users')) || [
        { id: 1, name: 'مدیر فروشگاه', phone: '09123456789', email: 'mohammad@gmail.com', password: 'mohammad', role: 'admin', credit: 0, createdAt: new Date().toISOString() }
    ];
    
    let products = JSON.parse(localStorage.getItem('products')) || [
        { id: 1, name: 'تیشرت سه بعدی', price: 250000, stockType: 'limited', quantity: 5, image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=300', special: true, discount: { type: 'time', start: '2026-06-10', end: '2026-07-10', percent: 20 } },
        { id: 2, name: 'شلوار جین سه بعدی', price: 580000, stockType: 'unlimited', quantity: 0, image: 'https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=300', special: true, discount: { type: 'unlimited', percent: 10 } },
        { id: 3, name: 'هودی سه بعدی', price: 420000, stockType: 'limited', quantity: 3, image: 'https://images.unsplash.com/photo-1556905055-8f358a7a47b2?w=300', special: false, discount: null }
    ];
    
    let orders = JSON.parse(localStorage.getItem('orders')) || [];
    let messages = JSON.parse(localStorage.getItem('messages')) || [
        { id: 1, to: 'all', text: 'به فروشگاه سه بعدی خوش آمدید! ✨', date: new Date().toISOString() }
    ];
    
    let tickets = JSON.parse(localStorage.getItem('tickets')) || [];
    let creditRequests = JSON.parse(localStorage.getItem('creditRequests')) || [];
    let creditSettings = JSON.parse(localStorage.getItem('creditSettings')) || { min: 10000, max: 500000 };
    let defaultCredit = JSON.parse(localStorage.getItem('defaultCredit')) || 50000;
    let currentUser = null;
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function saveData() {
        localStorage.setItem('users', JSON.stringify(users));
        localStorage.setItem('products', JSON.stringify(products));
        localStorage.setItem('orders', JSON.stringify(orders));
        localStorage.setItem('messages', JSON.stringify(messages));
        localStorage.setItem('tickets', JSON.stringify(tickets));
        localStorage.setItem('defaultCredit', JSON.stringify(defaultCredit));
        localStorage.setItem('cart', JSON.stringify(cart));
        localStorage.setItem('creditRequests', JSON.stringify(creditRequests));
        localStorage.setItem('creditSettings', JSON.stringify(creditSettings));
    }

    function showLogin() {
        document.getElementById('loginPage').classList.remove('hidden');
        document.getElementById('registerPage').classList.add('hidden');
        document.getElementById('forgotPage').classList.add('hidden');
        document.getElementById('customerPanel').classList.add('hidden');
        document.getElementById('adminPanel').classList.add('hidden');
    }

    function showRegister() {
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('registerPage').classList.remove('hidden');
        document.getElementById('forgotPage').classList.add('hidden');
    }

    function showForgot() {
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('registerPage').classList.add('hidden');
        document.getElementById('forgotPage').classList.remove('hidden');
    }

    function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const user = users.find(u => u.email === email && u.password === password);
        if (user) {
            currentUser = user;
            localStorage.setItem('currentUser', JSON.stringify(user));
            if (user.role === 'admin') {
                showAdminPanel();
            } else {
                showCustomerPanel();
            }
        } else {
            alert('❌ ایمیل یا رمز عبور اشتباه است!');
        }
    }

    function handleRegister() {
        const name = document.getElementById('regName').value;
        const phone = document.getElementById('regPhone').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        if (!name || !phone || !email || !password) {
            alert('لطفاً تمام فیلدها را پر کنید!');
            return;
        }
        if (users.find(u => u.email === email)) {
            alert('این ایمیل قبلاً ثبت شده است!');
            return;
        }
        const newUser = {
            id: Date.now(),
            name, phone, email, password,
            role: 'customer',
            credit: defaultCredit,
            createdAt: new Date().toISOString()
        };
        users.push(newUser);
        saveData();

    function getFinalPrice(product) {
        let price = product.price;
        if (product.discount) {
            if (product.discount.type === 'unlimited') {
                price = product.price * (100 - product.discount.percent) / 100;
            } else if (product.discount.type === 'time') {
                const now = new Date().toISOString().split('T')[0];
                if (now >= product.discount.start && now <= product.discount.end) {
                    price = product.price * (100 - product.discount.percent) / 100;
                }
            }
        }
        return Math.round(price);
    }

    function renderCustomerProducts(onlySpecial = false) {
        let filtered = products;
        if (onlySpecial) filtered = products.filter(p => p.special === true);
        
        let html = '<div class="products-grid">';
        filtered.forEach(p => {
            const finalPrice = getFinalPrice(p);
            let discountHtml = '';
            if (p.discount) {
                let showDiscount = false, discountText = '';
                if (p.discount.type === 'unlimited') {
                    showDiscount = true;
                    discountText = `${p.discount.percent}% تخفیف`;
                } else if (p.discount.type === 'time') {
                    const now = new Date().toISOString().split('T')[0];
                    if (now >= p.discount.start && now <= p.discount.end) {
                        showDiscount = true;
                        discountText = `${p.discount.percent}% تخفیف تا ${p.discount.end}`;
                    }
                }
                if (showDiscount) discountHtml = `<div class="discount-badge">🔥 ${discountText}</div>`;
            }
            let stockHtml = p.stockType === 'limited' ? `<div style="font-size:11px;color:#aaa">📦 موجودی: ${p.quantity} عدد</div>` : `<div style="font-size:11px;color:#aaa">♾️ نامحدود</div>`;
            html += `
                <div class="product-card" onclick="addToCart(${p.id})">
                    <img src="${p.image}" alt="${p.name}">
                    ${discountHtml}
                    <h3>${p.name}</h3>
                    <div>
                        <span class="price">${finalPrice.toLocaleString()} تومان</span>
                        ${finalPrice !== p.price ? `<span class="old-price">${p.price.toLocaleString()}</span>` : ''}
                    </div>
                    ${stockHtml}
                    <button onclick="event.stopPropagation(); addToCart(${p.id})">➕ خرید</button>
                </div>
            `;
        });
        html += '</div>';
        if (onlySpecial) {
            document.getElementById('customerSpecials').innerHTML = html;
        } else {
            document.getElementById('customerProducts').innerHTML = html;
        }
    }

    function renderDiscounts() {
        let html = '<div class="products-grid">';
        products.forEach(p => {
            if (p.discount) {
                let showDiscount = false, discountText = '';
                if (p.discount.type === 'unlimited') {
                    showDiscount = true;
                    discountText = `${p.discount.percent}% تخفیف دائمی`;
                } else if (p.discount.type === 'time') {
                    const now = new Date().toISOString().split('T')[0];
                    if (now >= p.discount.start && now <= p.discount.end) {
                        showDiscount = true;
                        discountText = `${p.discount.percent}% تخفیف تا ${p.discount.end}`;
                    }
                }
                if (showDiscount) {
                    const finalPrice = getFinalPrice(p);
                    html += `
                        <div class="product-card" onclick="addToCart(${p.id})">
                            <img src="${p.image}" alt="${p.name}">
                            <div class="discount-badge">🎁 ${discountText}</div>
                            <h3>${p.name}</h3>
                            <div>
                                <span class="price">${finalPrice.toLocaleString()} تومان</span>
                                <span class="old-price">${p.price.toLocaleString()}</span>
                            </div>
                            <button onclick="event.stopPropagation(); addToCart(${p.id})">➕ خرید</button>
                        </div>
                    `;
                }
            }
        });
        html += '</div>';
        document.getElementById('customerDiscounts').innerHTML = html || '<div class="message-box">هیچ تخفیفی فعال نیست</div>';
    }

    function addToCart(productId) {
        const product = products.find(p => p.id === productId);
        if (!product) return;
        if (product.stockType === 'limited' && product.quantity <= 0) {
            alert('متاسفانه این محصول موجود نیست!');
            return;
        }
        const existing = cart.find(item => item.id === productId);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        saveData();
        alert(`✅ ${product.name} به سبد خرید اضافه شد`);
    }

    function renderCart() {
        if (cart.length === 0) {
            document.getElementById('customerCart').innerHTML = '<div class="message-box">🛒 سبد خرید شما خالی است</div>';
            return;
        }
        let total = 0;
        let html = '<div class="products-grid">';
        cart.forEach(item => {
            const finalPrice = getFinalPrice(item);
            const itemTotal = finalPrice * item.quantity;
            total += itemTotal;
            html += `
                <div class="product-card">
                    <h3>${item.name}</h3>
                    <div>تعداد: ${item.quantity}</div>
                    <div>قیمت واحد: ${finalPrice.toLocaleString()} تومان</div>
                    <div><strong style="color:#a8c0ff">مجموع: ${Math.round(itemTotal).toLocaleString()} تومان</strong></div>
                    <button class="danger" onclick="removeFromCart(${item.id})">❌ حذف</button>
                </div>
            `;
        });
        html += '</div>';
        html += `<div class="credit-box">💰 مجموع: ${Math.round(total).toLocaleString()} تومان</div>`;
        html += `<button class="success" onclick="submitOrder(${total})">✅ ثبت سفارش</button>`;
        document.getElementById('customerCart').innerHTML = html;
    }

    function removeFromCart(productId) {
        cart = cart.filter(item => item.id !== productId);
        saveData();
        renderCart();
    }

    function submitOrder(total) {
        const user = users.find(u => u.id === currentUser.id);
        if (user.credit < total) {
            alert(`اعتبار شما کافی نیست! اعتبار فعلی: ${user.credit.toLocaleString()} تومان`);
            return;
        }
        cart.forEach(cartItem => {
            const product = products.find(p => p.id === cartItem.id);
            if (product && product.stockType === 'limited') {
                product.quantity -= cartItem.quantity;
            }
        });
        user.credit -= total;
        const newOrder = {
            id: Date.now(),
            userId: currentUser.id,
            userName: currentUser.name,
            products: [...cart],
            total: total,
            status: 'pending',
            rejectReason: '',
            createdAt: new Date().toISOString()
        };
        orders.push(newOrder);
        cart = [];
        saveData();
        updateCreditDisplay();
        alert('✅ سفارش شما ثبت شد و در انتظار تایید ادمین است');
        showCustomerSection('products');
    }

            <h3 class="section-title">📝 تیکت جدید</h3>

            if (ticket.answer) html += `<div class="answer-box"><strong>✅ پاسخ ادمین:</strong><div>${ticket.answer}</div></div>`;

    function createTicket() {
        const title = document.getElementById('ticketTitle')?.value;
        const message = document.getElementById('ticketMessage')?.value;

        saveData();
        alert('✅ تیکت با موفقیت ارسال شد');
        document.getElementById('ticketTitle').value = '';
        document.getElementById('ticketMessage').value = '';

    function renderCreditRequestForm() {
        document.getElementById('customerCreditRequest').innerHTML = `<h3 class="section-title">💰 درخواست اعتبار</h3>
            <div class="ticket-card"><p>حداقل: ${creditSettings.min.toLocaleString()} | حداکثر: ${creditSettings.max.toLocaleString()} تومان</p>
            <input type="number" id="requestAmount" placeholder="مبلغ مورد نظر" style="width:100%;margin-bottom:10px">
            <textarea id="requestReason" rows="3" placeholder="دلیل درخواست..." style="width:100%;margin-bottom:10px"></textarea>
            <button onclick="submitCreditRequest()" class="success">📤 ارسال درخواست</button></div><div id="userCreditRequests"></div>`;
        renderUserCreditRequests();

    function submitCreditRequest() {
        const amount = parseInt(document.getElementById('requestAmount')?.value);
        const reason = document.getElementById('requestReason')?.value;
        if (!amount || amount < creditSettings.min) return alert(`حداقل مبلغ ${creditSettings.min.toLocaleString()} تومان است`);
        if (amount > creditSettings.max) return alert(`حداکثر مبلغ ${creditSettings.max.toLocaleString()} تومان است`);
        if (!reason) return alert('لطفاً دلیل را وارد کنید');
        creditRequests.push({ id: Date.now(), userId: currentUser.id, userName: currentUser.name, amount, reason, status: 'pending', createdAt: new Date().toISOString() });
        saveData();
        alert('✅ درخواست اعتبار ثبت شد');
        document.getElementById('requestAmount').value = '';
        document.getElementById('requestReason').value = '';
        renderUserCreditRequests();
    }

    function renderUserCreditRequests() {
        const userRequests = creditRequests.filter(r => r.userId === currentUser.id);
        if (userRequests.length === 0) { document.getElementById('userCreditRequests').innerHTML = '<div class="message-box">هیچ درخواستی ثبت نکرده‌اید</div>'; return; }
        let html = '<h3 class="section-title">📋 درخواست‌های قبلی</h3>';
        userRequests.forEach(r => {
            let statusText = r.status === 'pending' ? '⏳ در انتظار' : (r.status === 'approved' ? '✅ تایید شده' : '❌ رد شده');
            html += `<div class="ticket-card">💰 ${r.amount.toLocaleString()} تومان - ${statusText}<br><small>${new Date(r.createdAt).toLocaleDateString('fa-IR')}</small></div>`;
        });
        document.getElementById('userCreditRequests').innerHTML = html;
    }

        document.getElementById('customerPanel').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');

    function showAdminSection(section) {

        else if (section === 'users') { document.getElementById('adminUsers').classList.remove('hidden'); renderUsersList(); }
        else if (section === 'credit') { document.getElementById('adminCredit').classList.remove('hidden'); renderCreditManagement(); }
        else if (section === 'creditRequests') { document.getElementById('adminCreditRequests').classList.remove('hidden'); renderCreditRequestsAdmin(); }
        else if (section === 'tickets') { document.getElementById('adminTickets').classList.remove('hidden'); renderAdminTickets(); }
        else if (section === 'messages') { document.getElementById('adminMessages').classList.remove('hidden'); renderAdminMessages(); }
    }

    function renderDashboard() {
        const today = new Date().toISOString().split('T')[0];
        const approvedOrders = orders.filter(o => o.status === 'approved');
        const dailyProfit = approvedOrders.filter(o => o.createdAt.split('T')[0] === today).reduce((s, o) => s + o.total, 0);
        const weeklyProfit = approvedOrders.filter(o => { const d = new Date(o.createdAt); const now = new Date(); const weekAgo = new Date(now.setDate(now.getDate() - 7)); return d >= weekAgo; }).reduce((s, o) => s + o.total, 0);
        const monthlyProfit = approvedOrders.filter(o => { const d = new Date(o.createdAt); const now = new Date(); const monthAgo = new Date(now.setMonth(now.getMonth() - 1)); return d >= monthAgo; }).reduce((s, o) => s + o.total, 0);
        const todayRegistrations = users.filter(u => u.createdAt && u.createdAt.split('T')[0] === today).length;
        document.getElementById('adminDashboard').innerHTML = `<div class="products-grid" style="grid-template-columns:repeat(auto-fill,minmax(200px,1fr))">
            <div class="product-card"><h3>💰 سود روزانه</h3><div class="price">${Math.round(dailyProfit).toLocaleString()} تومان</div></div>
            <div class="product-card"><h3>📆 سود هفتگی</h3><div class="price">${Math.round(weeklyProfit).toLocaleString()} تومان</div></div>
            <div class="product-card"><h3>📅 سود ماهانه</h3><div class="price">${Math.round(monthlyProfit).toLocaleString()} تومان</div></div>
            <div class="product-card"><h3>👥 عضویت امروز</h3><div class="price">${todayRegistrations} نفر</div></div>
            <div class="product-card"><h3>👥 کل کاربران</h3><div class="price">${users.filter(u=>u.role==='customer').length} نفر</div></div>
        </div>`;
    }

    function renderAdminProducts() {
        let html = `<div style="background:rgba(30,30,55,0.8);padding:18px;border-radius:28px;margin-bottom:20px"><h3 style="color:#fff;font-size:18px">➕ افزودن کالای جدید</h3>
            <div style="display:grid;grid-template-columns:1fr;gap:10px"><input type="text" id="newProductName" placeholder="نام کالا"><input type="number" id="newProductPrice" placeholder="قیمت">

            <button onclick="addProduct()">➕ افزودن</button></div></div><h3 class="section-title">📦 لیست کالاها</h3><div class="products-grid">`;
        products.forEach(p => { html += `<div class="product-card"><h3>${p.name}</h3><div>💰 قیمت: ${p.price.toLocaleString()} تومان</div><div>📦 موجودی: ${p.stockType === 'limited' ? p.quantity + ' عدد' : 'نامحدود'}</div>
            <input type="number" id="price_${p.id}" placeholder="قیمت جدید" value="${p.price}" style="width:90%;margin:5px 0"><input type="number" id="qty_${p.id}" placeholder="تعداد جدید" value="${p.quantity}" style="width:90%;margin:5px 0">
            <button onclick="updateProduct(${p.id})">✏️ ویرایش</button><button class="danger" onclick="deleteProduct(${p.id})">🗑️ حذف</button></div>`; });

        document.getElementById('adminProducts').innerHTML = html;

    function addProduct() {
        const name = document.getElementById('newProductName')?.value;
        const price = parseInt(document.getElementById('newProductPrice')?.value);
        const stockType = document.getElementById('newProductStock')?.value;
        const quantity = parseInt(document.getElementById('newProductQuantity')?.value) || 0;
        const special = document.getElementById('newProductSpecial')?.checked || false;
        if (!name || !price) return alert('نام و قیمت الزامی است');
        products.push({ id: Date.now(), name, price, stockType, quantity, special, image: 'https://images.unsplash.com/photo-1532453288672-3a27e9be9efd?w=300', discount: null });
        saveData();
        renderAdminProducts();
        alert('✅ کالا اضافه شد');
    }

    function updateProduct(id) {
        const product = products.find(p => p.id === id);
        const newPrice = parseInt(document.getElementById(`price_${id}`)?.value);
        const newQty = parseInt(document.getElementById(`qty_${id}`)?.value);
        if (newPrice) product.price = newPrice;
        if (newQty && product.stockType === 'limited') product.quantity = newQty;
        saveData();
        renderAdminProducts();
        alert('✅ کالا ویرایش شد');
    }

    function deleteProduct(id) {
        if (confirm('آیا از حذف این کالا مطمئن هستید؟')) {
            products = products.filter(p => p.id !== id);
            saveData();
            renderAdminProducts();
            alert('✅ کالا حذف شد');
        }
    }

    function renderPendingOrders() {
        const pending = orders.filter(o => o.status === 'pending');
        if (pending.length === 0) { document.getElementById('adminOrders').innerHTML = '<div class="message-box">✅ هیچ سفارشی در انتظار نیست</div>'; return; }
        let html = '<h3 class="section-title">📦 سفارشات در انتظار</h3>';
        pending.forEach(order => { html += `<div class="ticket-card"><h4>👤 سفارش از: ${order.userName}</h4><div>💰 مبلغ: ${Math.round(order.total).toLocaleString()} تومان</div>
            <button class="success" onclick="approveOrder(${order.id})">✅ تایید</button><button class="danger" onclick="rejectOrder(${order.id})">❌ رد</button>
            <input type="text" id="rejectReason_${order.id}" placeholder="دلیل رد" style="margin-top:8px"></div>`; });
        document.getElementById('adminOrders').innerHTML = html;
    }

    function approveOrder(id) { const order = orders.find(o => o.id === id); if (order) { order.status = 'approved'; saveData(); renderPendingOrders(); alert('✅ سفارش تایید شد'); } }
    function rejectOrder(id) { const reason = document.getElementById(`rejectReason_${id}`)?.value; const order = orders.find(o => o.id === id); if (order) { order.status = 'rejected'; order.rejectReason = reason; const user = users.find(u => u.id === order.userId); if (user) user.credit += order.total; saveData(); renderPendingOrders(); alert('❌ سفارش رد شد'); } }

    function renderUsersList() {
        const customers = users.filter(u => u.role === 'customer');
        if (customers.length === 0) { document.getElementById('adminUsers').innerHTML = '<div class="message-box">👥 هیچ کاربری ثبت نام نکرده است</div>'; return; }

        customers.forEach((u, index) => { html += `<tr><td>${index + 1}</td><td>${u.name}</td><td>${u.phone}</td><td>${u.email}</td><td style="color:#a8c0ff">${(u.credit || 0).toLocaleString()}</td></tr>`; });
        html += '</tbody></table></div>';
        document.getElementById('adminUsers').innerHTML = html;
    }

    function renderCreditManagement() {
        document.getElementById('adminCredit').innerHTML = `<div style="background:rgba(30,30,55,0.8);padding:18px;border-radius:28px;margin-bottom:15px"><h3 style="color:#fff;font-size:16px">💰 اعتبار پیش‌فرض</h3><input type="number" id="defaultCreditInput" value="${defaultCredit}" style="width:100%"><button onclick="setDefaultCredit()" style="margin-top:8px">ذخیره</button></div>
            <div style="background:rgba(30,30,55,0.8);padding:18px;border-radius:28px;margin-bottom:15px"><h3 style="color:#fff;font-size:16px">⚙️ تنظیمات درخواست اعتبار</h3><input type="number" id="minCredit" value="${creditSettings.min}" placeholder="حداقل" style="width:48%;display:inline-block"><input type="number" id="maxCredit" value="${creditSettings.max}" placeholder="حداکثر" style="width:48%;display:inline-block"><button onclick="updateCreditSettings()" style="margin-top:8px">ذخیره</button></div>
            <div style="background:rgba(30,30,55,0.8);padding:18px;border-radius:28px"><h3 style="color:#fff;font-size:16px">🎁 افزودن اعتبار به کاربر</h3><select id="selectUser" style="width:100%">${users.filter(u=>u.role==='customer').map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}</select><input type="number" id="addCreditAmount" placeholder="مبلغ" style="width:100%;margin-top:8px"><button onclick="addCreditToUser()" style="margin-top:8px">➕ افزودن</button></div>`;
    }

    function setDefaultCredit() { defaultCredit = parseInt(document.getElementById('defaultCreditInput')?.value); saveData(); alert('✅ اعتبار پیش‌فرض ذخیره شد'); }
    function updateCreditSettings() { const min = parseInt(document.getElementById('minCredit')?.value); const max = parseInt(document.getElementById('maxCredit')?.value); if (min && max && min < max) { creditSettings.min = min; creditSettings.max = max; saveData(); alert('✅ تنظیمات ذخیره شد'); } else alert('مقادیر معتبر وارد کنید'); }
    function addCreditToUser() { const userId = parseInt(document.getElementById('selectUser')?.value); const amount = parseInt(document.getElementById('addCreditAmount')?.value); const user = users.find(u => u.id === userId); if (user && amount > 0) { user.credit = (user.credit || 0) + amount; saveData(); alert(`✅ ${amount.toLocaleString()} تومان به ${user.name} اضافه شد`); renderCreditManagement(); renderUsersList(); } }

    function renderCreditRequestsAdmin() {
        const pending = creditRequests.filter(r => r.status === 'pending');
        if (pending.length === 0) { document.getElementById('adminCreditRequests').innerHTML = '<div class="message-box">✅ هیچ درخواستی در انتظار نیست</div>'; return; }
        let html = '<h3 class="section-title">📝 درخواست‌های اعتبار</h3>';
        pending.forEach(req => { html += `<div class="ticket-card"><h4>👤 کاربر: ${req.userName}</h4><div>💰 مبلغ: ${req.amount.toLocaleString()} تومان</div><div>📝 دلیل: ${req.reason}</div><button class="success" onclick="approveCreditRequest(${req.id})">✅ تایید</button><button class="danger" onclick="rejectCreditRequest(${req.id})">❌ رد</button><input type="text" id="rejectReasonCredit_${req.id}" placeholder="دلیل رد"></div>`; });
        document.getElementById('adminCreditRequests').innerHTML = html;
    }

    function approveCreditRequest(requestId) { const request = creditRequests.find(r => r.id === requestId); if (request) { const user = users.find(u => u.id === request.userId); if (user) { user.credit = (user.credit || 0) + request.amount; request.status = 'approved'; saveData(); renderCreditRequestsAdmin(); alert('✅ درخواست تایید شد'); } } }
    function rejectCreditRequest(requestId) { const reason = document.getElementById(`rejectReasonCredit_${requestId}`)?.value; const request = creditRequests.find(r => r.id === requestId); if (request) { request.status = 'rejected'; request.rejectReason = reason; saveData(); renderCreditRequestsAdmin(); alert('❌ درخواست رد شد'); } }

    function renderAdminTickets() {
        const pendingTickets = tickets.filter(t => t.status === 'pending');
        let html = `<h3 class="section-title">🎫 تیکت‌های در انتظار پاسخ</h3>`;
        if (pendingTickets.length === 0) html += '<div class="message-box">✅ هیچ تیکتی در انتظار نیست</div>';
        else pendingTickets.forEach(ticket => { html += `<div class="ticket-card"><h4>📌 ${ticket.title}</h4><div><strong>👤 کاربر:</strong> ${ticket.userName}</div><div style="margin:8px 0">${ticket.message}</div><textarea id="answer_${ticket.id}" rows="2" placeholder="پاسخ..." style="width:100%"></textarea><button class="success" onclick="answerTicket(${ticket.id})">📤 ارسال پاسخ</button></div>`; });
        document.getElementById('adminTickets').innerHTML = html;
    }

    function answerTicket(ticketId) { const answer = document.getElementById(`answer_${ticketId}`)?.value; if (!answer) return alert('لطفاً پاسخ را وارد کنید'); const ticket = tickets.find(t => t.id === ticketId); if (ticket) { ticket.answer = answer; ticket.status = 'answered'; ticket.answeredAt = new Date().toISOString(); saveData(); messages.push({ id: Date.now(), to: ticket.userId, text: `پاسخ به تیکت "${ticket.title}": ${answer}`, date: new Date().toISOString() }); alert('✅ پاسخ ارسال شد'); renderAdminTickets(); } }

    function renderAdminMessages() {
        document.getElementById('adminMessages').innerHTML = `<div style="background:rgba(30,30,55,0.8);padding:18px;border-radius:28px;margin-bottom:15px"><h3 style="color:#fff;font-size:16px">📢 پیام همگانی</h3><textarea id="publicMsg" rows="2" style="width:100%"></textarea><button onclick="sendPublicMessage()">ارسال به همه</button></div>
            <div style="background:rgba(30,30,55,0.8);padding:18px;border-radius:28px;margin-bottom:15px"><h3 style="color:#fff;font-size:16px">👤 پیام خصوصی</h3><select id="selectUserMsg" style="width:100%">${users.filter(u=>u.role==='customer').map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}</select><textarea id="privateMsg" rows="2" style="width:100%;margin-top:8px"></textarea><button onclick="sendPrivateMessage()">ارسال خصوصی</button></div><div id="incomingMessages"></div>`;
        renderIncomingMessages();
    }

    function sendPublicMessage() { const text = document.getElementById('publicMsg')?.value; if (!text) return alert('متن پیام را وارد کنید'); messages.push({ id: Date.now(), to: 'all', text, date: new Date().toISOString() }); saveData(); alert('✅ پیام ارسال شد'); document.getElementById('publicMsg').value = ''; }
    function sendPrivateMessage() { const userId = parseInt(document.getElementById('selectUserMsg')?.value); const text = document.getElementById('privateMsg')?.value; if (!text) return alert('متن پیام را وارد کنید'); messages.push({ id: Date.now(), to: userId, text, date: new Date().toISOString() }); saveData(); alert('✅ پیام خصوصی ارسال شد'); document.getElementById('privateMsg').value = ''; }
    function renderIncomingMessages() { const fromUsers = messages.filter(m => m.to === 'admin'); let html = '<h3 class="section-title">📨 پیام‌های کاربران</h3>'; if (fromUsers.length === 0) html += '<div class="message-box">هیچ پیامی وجود ندارد</div>'; else fromUsers.forEach(m => { html += `<div class="message-box">📩 ${m.text}<br><small>${new Date(m.date).toLocaleDateString('fa-IR')}</small></div>`; }); document.getElementById('incomingMessages').innerHTML = html; }

    // شروع برنامه
    const savedUser = localStorage.getItem('currentUser');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        const userStillExists = users.find(u => u.id === currentUser.id);
        if (userStillExists) { currentUser = userStillExists; if (currentUser.role === 'admin') showAdminPanel(); else showCustomerPanel(); }
        else showLogin();
    } else showLogin();
</script>
</body>
</html>
